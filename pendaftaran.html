<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS - Pendaftaran</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <header class="header-menu">
        <div class="title">
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
            <a href="/index.html">Home</a>
            <a href="/pengguna.html">Pengguna</a>
            <a class="active" href="/pendaftaran.html">Pendaftaran</a>
            <a href="rawatjalan.html">Rawat Jalan</a>
        </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>

<section class="section-pengguna">

    <h2>Pendaftaran Pasien</h2>
    </div>

    <div class="modal-body">
        <form class="form-grid">

            <div class="form-group">
                <label>Nama Pasien :</label>
                <input required type="text" placeholder="Masukkan Nama Pasien">
            </div>

            <div class="form-group">
                <label>No RM Pasien :</label>
                <input required type="text" placeholder="Masukkan No RM">
            </div>

            <div class="form-group">
                <label>NIK Pasien :</label>
                <input required type="text" placeholder="Masukkan NIK">
            </div>

            <div class="form-group">
                <label>Tanggal Lahir :</label>
                <input required type="date">
            </div>

            <div class="form-group">
                <label>Tujuan Poliklinik :</label>
                <select>
                    <option>Pilih Poliklinik</option>
                    <option>Poli Umum</option>
                    <option>Poli Gigi</option>
                    <option>Poli Anak</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dokter Poliklinik :</label>
                <select>
                    <option>Pilih Dokter</option>
                    <option>Dr. Andi</option>
                    <option>Dr. Sinta</option>
                </select>
            </div>

        </form>
    </div>

    <div class="modal-footer">
        <button class="btn-save">Simpan</button>
  
    </div>
</div>

</body>
</html>
